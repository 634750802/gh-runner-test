name: Rust Multi-Arch Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: arc-runner-amd64-c6i-2xl
          - arch: arm64
            runner: arc-runner-arm64-c7g-2xl
    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.arch }})
    steps:
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev git

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: System info
        run: |
          uname -m
          nproc
          free -h
          rustc --version

      - name: Clone ripgrep
        run: git clone --depth 1 --branch 14.1.1 https://github.com/BurntSushi/ripgrep.git

      - name: Build ripgrep (release)
        run: |
          cd ripgrep
          echo "::group::Build start"
          time cargo build --release 2>&1
          echo "::endgroup::"

      - name: Test ripgrep
        run: |
          cd ripgrep
          cargo test --release 2>&1 | tail -20

      - name: Binary info
        run: |
          ls -lh ripgrep/target/release/rg
          ripgrep/target/release/rg --version
