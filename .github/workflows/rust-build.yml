name: Rust Multi-Arch Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: arc-runner-amd64-c6i-2xl
          - arch: arm64
            runner: arc-runner-arm64-c7g-2xl
    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.arch }})
    steps:
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev git cmake

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: System info
        run: |
          echo "=== Architecture ==="
          uname -m
          echo "=== CPU cores ==="
          nproc
          echo "=== Memory ==="
          free -h
          echo "=== Rust ==="
          rustc --version
          echo "=== CPU model ==="
          lscpu | grep "Model name" || true

      - name: Clone cargo-nextest (large project)
        run: git clone --depth 1 --branch cargo-nextest-0.9.96 https://github.com/nextest-rs/nextest.git

      - name: Build cargo-nextest (release)
        run: |
          cd nextest
          echo "Build start: $(date)"
          time cargo build --release -p cargo-nextest 2>&1
          echo "Build end: $(date)"

      - name: Binary info
        run: |
          ls -lh nextest/target/release/cargo-nextest
          nextest/target/release/cargo-nextest --version
